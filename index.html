<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favicon Generator</title>
    <meta name="theme-color" content="#f8f9fa" />
    <meta name="description" content="Generate Windows-compatible .ico files and favicons from PNG/JPG images">
    <link rel="canonical" href="https://favicon.dotrino.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Dotrino" />
    <meta property="og:title" content="Favicon Generator" />
    <meta property="og:description" content="Generate favicons and .ico icons (Windows-compatible) from a PNG/JPG image. Everything in the browser." />
    <meta property="og:url" content="https://favicon.dotrino.com/" />
    <meta property="og:image" content="https://favicon.dotrino.com/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Favicon Generator" />
    <meta name="twitter:description" content="Generate favicons and .ico icons from an image. Everything in the browser." />
    <meta name="twitter:image" content="https://favicon.dotrino.com/og.jpg" />
    <!-- Analítica cookieless autohosteada (GoatCounter); no cuenta en localhost/LAN. -->
    <script>window.goatcounter={path:function(p){return location.hostname+p}}</script>
    <script data-goatcounter="https://goat.dotrino.com/count" async src="https://goat.dotrino.com/count.js"></script>
      <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Favicon Generator",
      "url": "https://favicon.dotrino.com/",
      "description": "Generate favicons and .ico icons from a PNG/JPG image. Everything in the browser.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "Dotrino", "url": "https://dotrino.com/" }
    }
    </script>
</head>
  <body>
    <dotrino-support floating href="https://ko-fi.com/dotrino" repo="dotrino/favicon-generator" discord="https://discord.gg/D648uq7cth"></dotrino-support>
    <dotrino-back floating style="top:14px;left:14px;color:#e2e8f0;--cc-back-bg:rgba(15,23,42,.55);--cc-back-bg-hover:rgba(15,23,42,.8)"></dotrino-back>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
